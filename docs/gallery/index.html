<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
        <link rel="stylesheet"  href="/css/style.css">
    </head>
    <body>
        <div class="wrapper">
            <header>
                <nav class="navbar">
                    <div class="container-fluid">
                        <a class="navbar-brand" href="/">
                            KF
                        </a>

                        <div class="d-flex ms-auto align-items-stretch">
                            <a class="btn navbar-btn d-flex align-items-center px-4" href="/" role="button">Home</a>
                            <a class="btn navbar-btn d-flex align-items-center px-4 ms-2" href="/about" role="button">About</a>
                            <!--<a class="btn navbar-btn d-flex align-items-center px-4 ms-2" href="/gallery" role="button">Gallery</a>-->
                        </div>
                    </div>
                </nav>
            </header>
            <main id="gallery_container" class="container-fluid">
                <div class="row text-center">
                    <h1 id = "page_title">
                        <span>
                            ASIM WORKSHOP GALLERY
                        </span>
                    </h1>
                </div>
                <div class="container">
                    <div class="gallery">
                        <div class="card gallery-card" onclick="event.stopPropagation(); window.open('/artwork/output-of-you', '_self')" style="cursor: pointer;">
                            <img src = "/images/placeholder.jpg" alt = "Gallery Image">
                            <h2 class="gallery-card-body">
                                Output of You
                            </h2>
                        </div>
                        <div class="card gallery-card" onclick="event.stopPropagation(); window.open('/artwork/reading-my-emotions', '_self')" style="cursor: pointer;">
                            <img src = "../artwork/reading-my-emotions/RME-gallery.jpg" alt = "Gallery Image">
                            <h2 class="gallery-card-body">
                                Reading My Emotions
                            </h2>
                        </div>
                        <div class="card gallery-card">
                            <img src = "../artwork/ecology-map/ECO-Mindmap.jpg" alt = "Gallery Image">
                            <h2 class="gallery-card-body">
                                Artistic Practice Ecology Map
                            </h2>
                        </div>
                        <div class="card gallery-card">
                            <img src = "/images/placeholder.jpg" alt = "Gallery Image">
                            <h2 class="gallery-card-body">
                                Art by Katie Frymire
                            </h2>
                        </div>
                    </div>
                </div>
            </main>
            <footer>
                <nav id="footer" class="navbar">
                    <div class="container-fluid" >
                        <span class="navbar-text" style="color: white; font-size: x-small;">
                            Copyright &copy; 2025 Katie Frymire.
                        </span>
                    </div>
                </nav>
            </footer>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/p5@1.9.2/lib/p5.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
